trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  ACCELQ_URL: 'https://app.accelq.io/'
  ACCELQ_USERNAME: 'rajesh.rasamalla@accelq.com'
  ACCELQ_TENANT: 'aqsupport'
  ACCELQ_JOB_ID: '8815'

steps:

# ── Install Docker Compose (if needed) ──
- script: |
    docker --version
    docker compose version || docker-compose version
  displayName: 'Check Docker Installation'

# ── Start Application using Docker Compose ──
- script: |
    docker compose -f docker-compose.yml up -d
  displayName: 'Start Application Stack'

# ── Wait for Services to be Ready ──
- script: |
    echo "Waiting for services to start..."
    sleep 30
  displayName: 'Wait for Services'

# ── Run ACCELQ Test Job ──
- task: aqciconnect@2
  inputs:
    appURL: 'https://app.accelq.io/'
    userName: 'rajesh.rasamalla@accelq.com'
    apiKey: 'NDKEuxJ0BGmnyp-QGNJNFkcoMpDbZWGLcKHK93JVawoaq'   # Store in Pipeline Secrets
    tenantCode: 'aqsupport'
    jobId: '8815'

# ── Stop Containers (Cleanup) ──
- script: |
    docker compose down
  displayName: 'Stop Application Stack'
  condition: always()